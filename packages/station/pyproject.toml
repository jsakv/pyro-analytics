[project]
name = "pyronear-station"
version = "0.1.0"
description = "Reusable station map publisher library for Pyronear Analytics."
readme = "README.md"
requires-python = ">=3.14,<3.15"
authors = [{ name = "Pyronear <contact@pyronear.org>", email = "contact@pyronear.org" }]
dependencies = [
    "boto3",
    "geojson-pydantic",
    "h3",
    "httpx",
    "orjson",
    "polars",
    "polars-h3",
    "pydantic",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/station"]
