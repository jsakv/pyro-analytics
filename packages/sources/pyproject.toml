[project]
name = "sources"
version = "0.1.0"
description = "Reusable dlt source definitions for Pyronear Analytics."
readme = "../../README.md"
requires-python = ">=3.12,<3.14"
authors = [{ name = "Pyronear <contact@pyronear.org>", email = "contact@pyronear.org" }]
dependencies = [
    "dlt>=1.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sources"]
